name: Deploy static site to Pages

on:
  push:
    branches: ["main"]      # deploy on every push to main
  workflow_dispatch:        # ...and allow a manual "Run workflow" button

# Least-privilege token: only what Pages deploy needs
permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-progress prod deploy finish; queue (don't cancel) new ones
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'            # repo root — where your index.html lives

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
